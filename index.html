<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library App</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 style="text-align: center;">
      Welcome to Athena — the library of knowledge and wisdom.
    </h1>
    <button class="btn add" popovertarget="new-book-dialog">Add Book</button>
    <dialog id="new-book-dialog" popover>
      <form action="" method="post" id="book-form" style="margin-bottom: 12px">
        <div>
          <label for="book-title">Title</label>
          <input id="book-title" name="book-title" type="text" required />
        </div>
        <div>
          <label for="book-author">Author</label>
          <input id="book-author" name="book-author" type="text" required />
        </div>
        <div>
          <label for="pages-num">Number of pages</label>
          <input id="pages-num" name="pages-num" type="number" required />
        </div>
        <div>
          <label for="isRead">Is Read</label>
          <input id="isRead" name="isRead" type="checkbox" />
        </div>
        <button class="btn add" type="submit" id="add-book-btn">Add</button>
      </form>
      <button
        class="btn remove"
        popovertarget="new-book-dialog"
        popovertargetaction="hide"
      >
        Close
      </button>
    </dialog>
    <div id="cards-container"></div>
  </body>
</html>
