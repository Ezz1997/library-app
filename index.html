<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library App</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Funnel+Sans:ital,wght@0,300..800;1,300..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Quintessential&family=Roboto:ital,wght@0,100..900;1,100..900&family=Story+Script&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="playfair-display-style">
    <h1 style="text-align: center">
      Welcome to Athena — the library of knowledge and wisdom.
    </h1>
    <button class="btn add" popovertarget="new-book-dialog">Add Book</button>
    <dialog id="new-book-dialog" popover>
      <div class="close-btn-container">
        <button
          popovertarget="new-book-dialog"
          popovertargetaction="hide"
          class="close-btn"
        >
          <span class="material-symbols-outlined close-btn-span"> close </span>
        </button>
        <form action="" method="post" id="book-form">
          <div>
            <input
              id="book-title"
              name="book-title"
              type="text"
              required
              placeholder="Title"
            />
          </div>
          <div>
            <input
              id="book-author"
              name="book-author"
              type="text"
              required
              placeholder="Author"
            />
          </div>
          <div>
            <input
              id="pages-num"
              name="pages-num"
              type="number"
              required
              placeholder="Number of Pages"
            />
          </div>
          <div style="display: flex; gap: 6px">
            <label for="isRead">Is Read</label>
            <input id="isRead" name="isRead" type="checkbox" />
          </div>
          <button class="btn add" type="submit" id="add-book-btn">Add</button>
        </form>
      </div>
    </dialog>
    <div id="cards-container"></div>
  </body>
</html>
